name: Zig stats exporter

# Publie le classement du serveur Minecraft vers Firebase, à intervalle régulier,
# directement depuis le cloud GitHub (gratuit sur dépôt public) — aucune machine à
# laisser allumée. Remplace l'exécution de l'exporteur sur un PC/VPS.
#
# Prérequis : ajouter un secret de dépôt « STATS_CONFIG » contenant le contenu de
# tools/zig-stats-exporter/config.json (Settings → Secrets and variables → Actions).
on:
  schedule:
    - cron: '*/5 * * * *'   # toutes les 5 min (minimum autorisé par GitHub)
  workflow_dispatch: {}       # + déclenchement manuel (onglet Actions → Run workflow)

permissions:
  contents: read

# Une seule exécution à la fois ; une nouvelle annule un éventuel cycle resté coincé.
concurrency:
  group: zig-stats
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    # La boucle tourne ~5,5 h par run (cf. --minutes ci-dessous) ; borne de sécurité
    # juste sous le plafond GitHub (6 h). Dépôt public = minutes gratuites/illimitées.
    timeout-minutes: 355
    defaults:
      run:
        working-directory: tools/zig-stats-exporter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Recrée config.json à partir du secret (jamais committé). printf écrit dans
      # le fichier sans afficher la valeur dans les logs ; GitHub masque en plus
      # automatiquement la valeur du secret si elle apparaissait.
      - name: Config depuis le secret
        env:
          STATS_CONFIG: ${{ secrets.STATS_CONFIG }}
        run: printf '%s' "$STATS_CONFIG" > config.json

      - name: Installe les dépendances (ssh2-sftp-client)
        run: npm install --no-audit --no-fund

      # Boucle ~5,5 h (MAJ toutes les intervalSeconds, ~30 s), puis arrêt propre.
      # Le cron */5 + concurrency.cancel-in-progress relancent une boucle fraîche :
      # tant qu'un run est vivant, les stats restent à jour en continu — fini le
      # « 1 MAJ puis plus rien pendant des heures » du mode --once.
      - name: Exporte les stats (boucle longue)
        run: node exporter.js --minutes 350
