name: Build Zig Shop mod

# Compile le mod NeoForge et publie le .jar en artefact téléchargeable.
# Se déclenche sur tout push touchant le mod, et manuellement.
on:
  push:
    paths:
      - 'zig-shop-mod/**'
      - '.github/workflows/zig-shop-mod.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12'

      - name: Build
        working-directory: zig-shop-mod
        run: gradle build --no-daemon --stacktrace

      - name: Publier le .jar
        uses: actions/upload-artifact@v4
        with:
          name: zigshop-jar
          path: zig-shop-mod/build/libs/*.jar
          if-no-files-found: error
