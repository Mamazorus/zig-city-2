modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''
${mod_description}
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# SkinRestorer (cote serveur) : applique les skins custom des comptes hors-ligne.
# Optionnel : si absent, zigshop n'applique simplement pas de skin (pas de crash).
# ordering=AFTER pour que SkinRestorer soit pret quand on l'appelle au join.
[[dependencies.${mod_id}]]
    modId="skinrestorer"
    type="optional"
    versionRange="[2.3.1,)"
    ordering="AFTER"
    side="SERVER"
